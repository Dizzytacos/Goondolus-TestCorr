<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AP Precal Test Corrections</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-secondary: #f8f8f6;
  --bg-tertiary: #f0f0ec;
  --bg-info: #e6f1fb;
  --bg-success: #eaf3de;
  --bg-warning: #faeeda;
  --bg-danger: #fcebeb;
  --text: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --text-info: #185fa5;
  --text-success: #3b6d11;
  --text-warning: #854f0b;
  --text-danger: #a32d2d;
  --border: rgba(0,0,0,0.12);
  --border-med: rgba(0,0,0,0.22);
  --border-info: rgba(24,95,165,0.4);
  --border-success: rgba(59,109,17,0.4);
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg-secondary: #252523;
    --bg-tertiary: #2e2e2b;
    --bg-info: #0c2d4a;
    --bg-success: #172d08;
    --bg-warning: #3a2004;
    --bg-danger: #3a1010;
    --text: #ebe9e0;
    --text-secondary: #a8a69e;
    --text-tertiary: #6e6c66;
    --text-info: #85b7eb;
    --text-success: #97c459;
    --text-warning: #ef9f27;
    --text-danger: #f09595;
    --border: rgba(255,255,255,0.1);
    --border-med: rgba(255,255,255,0.18);
    --border-info: rgba(133,183,235,0.4);
    --border-success: rgba(151,196,89,0.4);
  }
}

html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

.app { display: flex; flex-direction: column; height: 100vh; min-height: 600px; }

.topbar {
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  flex-shrink: 0;
}
.topbar h1 { font-size: 15px; font-weight: 500; color: var(--text); }
.badge {
  font-size: 11px;
  background: var(--bg-info);
  color: var(--text-info);
  padding: 2px 8px;
  border-radius: var(--radius-md);
}

.upload-zone {
  padding: 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}
.upload-box {
  border: 1.5px dashed var(--border-med);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s;
}
.upload-box:hover { background: var(--bg-tertiary); }
.upload-box.has-image { border-style: solid; border-color: var(--border-info); }
.upload-label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }
.upload-label span { color: var(--text-info); font-weight: 500; }
#file-input { display: none; }
.preview-img { max-height: 120px; max-width: 100%; border-radius: var(--radius-md); margin-top: 8px; }
.analyze-btn {
  margin-top: 10px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 500;
  background: var(--bg);
  color: var(--text);
  border: 0.5px solid var(--border-med);
  border-radius: var(--radius-md);
  cursor: pointer;
  width: 100%;
  transition: background 0.1s;
}
.analyze-btn:hover { background: var(--bg-secondary); }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.analyze-btn.loading { opacity: 0.7; }

.panels { display: flex; flex: 1; overflow: hidden; }
.panel { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }
.panel-left { border-right: 0.5px solid var(--border); }

.panel-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}
.empty-state { color: var(--text-tertiary); font-size: 13px; text-align: center; padding: 40px 20px; line-height: 1.6; }

.step-block {
  margin-bottom: 12px;
  padding: 12px 14px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--border-info);
}
.step-num { font-size: 11px; font-weight: 500; color: var(--text-info); margin-bottom: 4px; letter-spacing: 0.04em; }
.step-text { font-size: 13px; color: var(--text); line-height: 1.65; }

.example-block {
  margin-top: 16px;
  padding: 12px 14px;
  background: var(--bg-success);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--border-success);
}
.example-label { font-size: 11px; font-weight: 500; color: var(--text-success); margin-bottom: 6px; letter-spacing: 0.04em; }
.example-text { font-size: 13px; color: var(--text); line-height: 1.65; white-space: pre-wrap; }

.file-tree { margin-bottom: 16px; }
.tree-item {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tree-item.active { background: var(--bg-info); color: var(--text-info); font-weight: 500; }
.tree-arrow { font-size: 10px; opacity: 0.5; }

.notes-content { font-size: 13px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
.section-tag {
  display: inline-block;
  font-size: 11px;
  background: var(--bg-warning);
  color: var(--text-warning);
  padding: 2px 8px;
  border-radius: var(--radius-md);
  margin-bottom: 8px;
}
.error-msg {
  color: var(--text-danger);
  font-size: 13px;
  padding: 12px;
  background: var(--bg-danger);
  border-radius: var(--radius-md);
  line-height: 1.6;
}
.topic-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  color: var(--text-secondary);
  margin-bottom: 12px;
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>AP Precal Test Corrections</h1>
    <span class="badge">All notes loaded</span>
  </div>

  <div class="upload-zone">
    <div class="upload-box" id="upload-box" onclick="document.getElementById('file-input').click()">
      <div class="upload-label" id="upload-label">
        <span>Click to upload</span> a photo of your test problem
      </div>
      <img id="preview-img" class="preview-img" style="display:none;" />
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" />
    <button class="analyze-btn" id="analyze-btn" disabled onclick="analyze()">Analyze problem</button>
  </div>

  <div class="panels">
    <div class="panel panel-left">
      <div class="panel-title">Problem walkthrough</div>
      <div id="left-content">
        <div class="empty-state">Upload a test problem photo to get started</div>
      </div>
    </div>
    <div class="panel panel-right">
      <div class="panel-title">Notes reference</div>
      <div id="right-content">
        <div class="empty-state">Relevant notes and file location will appear here</div>
      </div>
    </div>
  </div>
</div>

let imageBase64 = null;
let imageMimeType = null;

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  imageMimeType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    const result = ev.target.result;
    imageBase64 = result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = result;
    img.style.display = 'block';
    document.getElementById('upload-label').style.display = 'none';
    document.getElementById('upload-box').classList.add('has-image');
    document.getElementById('analyze-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function fetchNoteContent(fileId) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{ type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'gdrive' }],
        messages: [{
          role: 'user',
          content: `Use the Google Drive MCP to read the file with ID "${fileId}" and return ONLY the raw text content of that file, nothing else.`
        }]
      })
    });
    const data = await resp.json();
    const toolResult = data.content && data.content.find(b => b.type === 'mcp_tool_result');
    if (toolResult && toolResult.content && toolResult.content[0]) return toolResult.content[0].text || '';
    const textBlock = data.content && data.content.find(b => b.type === 'text');
    return textBlock ? textBlock.text : '';
  } catch { return ''; }
}

async function analyze() {
  if (!imageBase64) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  btn.classList.add('loading');

  document.getElementById('left-content').innerHTML = '<div class="empty-state">Reading your problem...</div>';
  document.getElementById('right-content').innerHTML = '<div class="empty-state">Finding relevant notes...</div>';

  try {
    const notesIndexStr = NOTES_INDEX.map(n => `- "${n.label}" (fileId: ${n.id})`).join('\n');

    const firstPass = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMimeType, data: imageBase64 } },
            {
              type: 'text',
              text: `Look at this AP Precalculus test problem.\n\nHere are all available note files:\n${notesIndexStr}\n\nRespond ONLY with valid JSON, no markdown, no backticks:\n{\n  "problemText": "describe the problem in 1-2 sentences",\n  "topic": "the AP Precal topic name",\n  "relevantNoteIds": ["fileId1", "fileId2"],\n  "relevantNoteLabels": ["label1", "label2"],\n  "noteSections": ["e.g. II. A. 1", "III. B"],\n  "steps": ["step 1 text", "step 2 text", "..."],\n  "exampleProblem": "a worked example problem similar to this one, shown step by step"\n}`
            }
          ]
        }]
      })
    });

    const firstData = await firstPass.json();
    const rawText = firstData.content && firstData.content.find(b => b.type === 'text');
    if (!rawText) throw new Error('No response');

    let parsed;
    try {
      const clean = rawText.text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch { throw new Error('Could not parse response'); }

    const noteContents = {};
    for (const noteId of (parsed.relevantNoteIds || []).slice(0, 2)) {
      noteContents[noteId] = await fetchNoteContent(noteId);
    }

    const secondPass = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMimeType, data: imageBase64 } },
            {
              type: 'text',
              text: `Here is the actual content from the relevant notes:\n\n${Object.entries(noteContents).map(([id, content]) => { const note = NOTES_INDEX.find(n => n.id === id); return \`=== \${note ? note.label : id} ===\n\${content}\`; }).join('\n\n')}\n\nNow using ONLY what's in these notes (quote the exact section references like "II. A. 1"), provide a detailed correction for this test problem.\n\nRespond ONLY with valid JSON:\n{\n  "steps": ["step 1", "step 2", "..."],\n  "exampleProblem": "full worked example from or inspired by the notes",\n  "notesHighlight": "the most relevant quoted passage from the notes",\n  "notesSections": ["exact section reference like II. A. 1", "..."]\n}`
            }
          ]
        }]
      })
    });

    const secondData = await secondPass.json();
    const secondRaw = secondData.content && secondData.content.find(b => b.type === 'text');
    let finalParsed = parsed;
    if (secondRaw) {
      try {
        const clean2 = secondRaw.text.replace(/```json|```/g, '').trim();
        const merged = JSON.parse(clean2);
        finalParsed = { ...parsed, ...merged };
      } catch {}
    }

    renderResults(finalParsed);
  } catch (err) {
    document.getElementById('left-content').innerHTML = `<div class="error-msg">Something went wrong: ${err.message}. Try again.</div>`;
    document.getElementById('right-content').innerHTML = '<div class="empty-state">—</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Analyze problem';
  btn.classList.remove('loading');
}

function renderResults(data) {
  const leftEl = document.getElementById('left-content');
  const rightEl = document.getElementById('right-content');

  let leftHtml = '';
  if (data.topic) leftHtml += `<div class="topic-chip"><span style="font-size:10px;opacity:0.6;">topic</span> ${data.topic}</div>`;
  if (data.problemText) leftHtml += `<div class="step-block" style="border-left-color:var(--border-med);margin-bottom:16px;"><div class="step-num">PROBLEM</div><div class="step-text">${data.problemText}</div></div>`;
  if (data.steps && data.steps.length) {
    data.steps.forEach((step, i) => {
      leftHtml += `<div class="step-block"><div class="step-num">STEP ${i + 1}</div><div class="step-text">${step}</div></div>`;
    });
  }
  if (data.exampleProblem) leftHtml += `<div class="example-block"><div class="example-label">WORKED EXAMPLE</div><div class="example-text">${data.exampleProblem}</div></div>`;
  leftEl.innerHTML = leftHtml || '<div class="empty-state">No steps generated.</div>';

  let rightHtml = '';
  if (data.relevantNoteLabels && data.relevantNoteLabels.length) {
    rightHtml += '<div class="file-tree">';
    data.relevantNoteLabels.forEach((label, i) => {
      const sections = data.notesSections || data.noteSections || [];
      const isFirst = i === 0;
      rightHtml += `<div class="tree-item ${isFirst ? 'active' : ''}"><span class="tree-arrow">${isFirst ? '▶' : '▷'}</span>${label}</div>`;
      if (isFirst && sections.length) {
        sections.forEach(sec => {
          rightHtml += `<div class="tree-item" style="padding-left:24px;font-size:11px;"><span class="tree-arrow" style="opacity:0.3;">└</span>${sec}</div>`;
        });
      }
    });
    rightHtml += '</div>';
  }
  if (data.notesHighlight) {
    rightHtml += '<div class="section-tag">relevant passage</div>';
    rightHtml += `<div class="notes-content">${data.notesHighlight.replace(/\n/g, '<br>')}</div>`;
  }
  rightEl.innerHTML = rightHtml || '<div class="empty-state">No notes matched.</div>';
}
</script>
</body>
</html>
